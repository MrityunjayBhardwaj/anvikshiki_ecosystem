# data/business_expert.yaml — Business Strategy & Executive Decision-Making
# Extracted from guides/v325_new/business_expert/ Stage 2+3 output
# Domain: TYPE 4 (Practical/Craft) with secondary Type 3 (Empirical/Probabilistic)
#
# Notable features for engine testing:
#   - Chains: V01→V08 (value→long-term), V04→V05 (growth→signal decay)
#   - Rebutting conflict: V11 (not_value_creation) vs V01 (value_creation)
#   - Scope exclusions on V01, V02, V04, V08, V09 for undercutting attacks
#   - Mixed epistemic statuses: established, hypothesis, contested

domain_type: CRAFT
pramanas: ["pratyaksa", "anumana", "sabda", "upamana"]

vyaptis:
  V01:
    id: V01
    name: "The Value Equation"
    statement: "A business survives if and only if it creates more economic value than it consumes, as measured by unit economics of its core transaction"
    causal_status: empirical
    scope_conditions: ["commercial_enterprise"]
    scope_exclusions: ["subsidized_entity", "network_effect_building_phase"]
    confidence: {existence: 0.95, formulation: 0.9, evidence: "observational"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_hbs_unit_economics", "src_ries_2011"]
    antecedents: ["positive_unit_economics"]
    consequent: "value_creation"

  V02:
    id: V02
    name: "The Constraint Cascade"
    statement: "Performance is determined by the binding constraint; optimizing non-binding constraints produces zero marginal improvement"
    causal_status: empirical
    scope_conditions: ["serial_dependency_system"]
    scope_exclusions: ["highly_parallel_system"]
    confidence: {existence: 0.9, formulation: 0.85, evidence: "observational"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_goldratt_1984", "src_goldratt_1994"]
    antecedents: ["binding_constraint_identified"]
    consequent: "resource_allocation_effective"

  V03:
    id: V03
    name: "The Information Asymmetry Premium"
    statement: "The party with superior information captures disproportionate value; information asymmetry determines market structure and pricing power"
    causal_status: structural
    scope_conditions: ["heterogeneous_quality_market"]
    scope_exclusions: ["perfectly_commoditized_market", "regulated_disclosure_market"]
    confidence: {existence: 0.95, formulation: 0.9, evidence: "theoretical"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_shapiro_varian_1998", "src_porter_1985"]
    antecedents: ["superior_information"]
    consequent: "pricing_power"

  V04:
    id: V04
    name: "The Organizational Entropy Principle"
    statement: "Organizations accumulate coordination overhead and information loss as they grow, accelerating at thresholds of ~8, 50, 150, 500 people"
    causal_status: empirical
    scope_conditions: []
    scope_exclusions: ["active_structural_intervention"]
    confidence: {existence: 0.85, formulation: 0.75, evidence: "observational"}
    epistemic_status: established
    decay_risk: moderate
    decay_condition: "AI/remote tools may shift traditional thresholds"
    sources: ["src_dunbar_2010", "src_conway_1968", "src_skelton_pais_2019"]
    antecedents: ["organizational_growth"]
    consequent: "coordination_overhead"

  V05:
    id: V05
    name: "The Market Signal Decay Law"
    statement: "The further a decision-maker is from the customer, the more distorted the market signal becomes through aggregation, filtering, and reporting incentives"
    causal_status: empirical
    scope_conditions: []
    scope_exclusions: ["small_team_direct_contact"]
    confidence: {existence: 0.9, formulation: 0.85, evidence: "observational"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_blank_2005", "src_christensen_2016"]
    antecedents: ["coordination_overhead"]
    consequent: "distorted_market_signal"

  V06:
    id: V06
    name: "The Optionality-Commitment Tradeoff"
    statement: "Every strategic commitment simultaneously creates capability and destroys optionality; judgment quality is the accuracy of this tradeoff"
    causal_status: structural
    scope_conditions: []
    scope_exclusions: ["abundant_resources_relative_to_opportunity"]
    confidence: {existence: 0.95, formulation: 0.85, evidence: "theoretical"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_thorndike_2012"]
    antecedents: ["strategic_commitment"]
    consequent: "capability_gain"

  V07:
    id: V07
    name: "The Incentive-Behavior Isomorphism"
    statement: "Actual behavior converges to what is actually incentivized regardless of stated values; culture is the emergent property of incentive structures"
    causal_status: empirical
    scope_conditions: []
    scope_exclusions: ["strong_intrinsic_motivation_org"]
    confidence: {existence: 0.9, formulation: 0.9, evidence: "observational"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_kerr_1975", "src_jensen_meckling_1976"]
    antecedents: ["incentive_alignment"]
    consequent: "organizational_effectiveness"

  V08:
    id: V08
    name: "The Capital Allocation Identity"
    statement: "Over long periods, company value is determined almost entirely by how its CEO allocates capital"
    causal_status: empirical
    scope_conditions: ["significant_free_cash_flow"]
    scope_exclusions: ["limited_allocation_discretion", "regulated_industry"]
    confidence: {existence: 0.85, formulation: 0.8, evidence: "observational"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_thorndike_2012", "src_buffett_letters", "src_mauboussin_2012"]
    antecedents: ["value_creation", "resource_allocation_effective"]
    consequent: "long_term_value"

  V09:
    id: V09
    name: "The Disruption Asymmetry"
    statement: "Incumbents systematically underinvest in low-margin markets because rational resource allocation within existing incentives directs investment to high-margin customers"
    causal_status: empirical
    scope_conditions: ["sustaining_innovation_trajectory"]
    scope_exclusions: ["attentive_incumbent", "scale_barrier_to_entry"]
    confidence: {existence: 0.75, formulation: 0.7, evidence: "observational"}
    epistemic_status: contested
    decay_risk: moderate
    decay_condition: "Ongoing empirical debate on disruption theory predictive power"
    sources: ["src_christensen_1997", "src_king_baatartogtokh_2015", "src_lepore_2014"]
    antecedents: ["incumbent_rational_allocation", "low_margin_market_entrant"]
    consequent: "disruption_vulnerability"

  V10:
    id: V10
    name: "The Judgment Calibration Principle"
    statement: "Executive judgment quality is determined less by information quantity and more by calibration accuracy — knowing what you know vs what you don't"
    causal_status: empirical
    scope_conditions: []
    scope_exclusions: ["decisions_under_near_certainty"]
    confidence: {existence: 0.85, formulation: 0.8, evidence: "experimental"}
    epistemic_status: established
    decay_risk: low
    sources: ["src_tetlock_2015", "src_kahneman_2011", "src_tetlock_2005"]
    antecedents: ["calibration_accuracy"]
    consequent: "decision_quality"

  # Conflict vyāpti: Growth with organizational entropy destroys value
  # Creates rebutting attack against V01's "value_creation" conclusion
  V11:
    id: V11
    name: "The Growth Trap"
    statement: "When organizational growth creates coordination overhead that outpaces value creation, the enterprise destroys value even with sound unit economics"
    causal_status: empirical
    scope_conditions: []
    scope_exclusions: ["active_structural_intervention", "small_team_direct_contact"]
    confidence: {existence: 0.7, formulation: 0.65, evidence: "observational"}
    epistemic_status: hypothesis
    decay_risk: low
    sources: ["src_dunbar_2010", "src_skelton_pais_2019"]
    antecedents: ["organizational_growth", "coordination_overhead"]
    consequent: "not_value_creation"

hetvabhasas:
  H01:
    id: H01
    name: "The Revenue Vanity Trap"
    description: "Inferring business health from revenue growth alone, ignoring unit economics, cash flow, and margin structure"
    detection_signature: "revenue_growth_cited_without_unit_economics"
    correction_pattern: "Require unit economic analysis alongside any revenue growth claim"
    common_contexts: ["startup_evaluation", "investor_pitches", "media_coverage"]

  H02:
    id: H02
    name: "The Framework Reification Error"
    description: "Treating strategic frameworks as causal models of reality rather than lossy heuristic compressions"
    detection_signature: "single_framework_treated_as_complete_model"
    correction_pattern: "Identify the null space of the framework — what it cannot see"
    common_contexts: ["competitive_analysis", "strategic_planning", "consulting"]

  H03:
    id: H03
    name: "The Survivorship Inference"
    description: "Studying successful companies to extract principles without examining companies that followed the same principles and failed"
    detection_signature: "success_stories_only"
    correction_pattern: "Include failed examples with the same characteristics; check base rates"
    common_contexts: ["strategy", "entrepreneurship", "management_books"]

  H04:
    id: H04
    name: "The Correlation-Strategy Confusion"
    description: "Observing shared features of successful companies and inferring the feature causes success without establishing causal mechanism"
    detection_signature: "correlational_claim_presented_as_causal"
    correction_pattern: "Check causal direction, common causes, and intervene-and-observe evidence"
    common_contexts: ["organizational_behavior", "culture_studies", "best_practices"]

  H05:
    id: H05
    name: "The Scalability Presumption"
    description: "Assuming what worked at scale N will work at scale 10N, ignoring phase transitions and constraint type shifts"
    detection_signature: "linear_extrapolation_across_scale_thresholds"
    correction_pattern: "Model the phase transition; identify what changes qualitatively at each threshold"
    common_contexts: ["startup_scaling", "market_sizing", "growth_planning"]

  H06:
    id: H06
    name: "The Sunk Cost Anchor"
    description: "Continuing to invest in a failing strategy because of prior investment rather than evaluating marginal returns"
    detection_signature: "prior_investment_cited_as_reason_to_continue"
    correction_pattern: "Evaluate only the marginal return of the next dollar; prior spend is irrelevant"
    common_contexts: ["capital_allocation", "project_management", "strategic_pivots"]

  H07:
    id: H07
    name: "The Moat Mirage"
    description: "Claiming competitive advantage from absence of competitors or temporary technology lead rather than structural barriers"
    detection_signature: "no_competitors_equated_with_competitive_advantage"
    correction_pattern: "Identify structural barriers (network effects, switching costs, scale economies); a head start is not a moat"
    common_contexts: ["startup_pitches", "competitive_analysis", "investor_evaluation"]

  H08:
    id: H08
    name: "The Metric Goodhart"
    description: "Optimizing for a measurable proxy and treating improvement in the proxy as improvement in the underlying goal"
    detection_signature: "metric_improvement_without_goal_verification"
    correction_pattern: "Verify that metric improvement correlates with goal achievement; watch for gaming behavior"
    common_contexts: ["incentive_design", "kpi_setting", "performance_management"]

threshold_concepts:
  - name: "Unit Economics as the Atomic Test of Value"
    reorganizes: ["growth_evaluation", "business_success_definition", "revenue_interpretation"]
    prerequisites: ["basic_arithmetic", "financial_statement_reading"]
    troublesome_aspects: ["own startup may be value-destroying", "media celebrates revenue not value"]

  - name: "Culture as Emergent Property Not Input"
    reorganizes: ["organizational_management", "leadership_understanding", "culture_building"]
    prerequisites: ["incentive_structures", "organizational_design_basics"]
    troublesome_aspects: ["loss of perceived direct control", "values statements feel powerful"]

  - name: "Judgment as Calibrated Bayesian Process"
    reorganizes: ["executive_judgment_understanding", "decision_making_framework", "expertise_evaluation"]
    prerequisites: ["bayesian_reasoning", "all_prior_business_concepts"]
    troublesome_aspects: ["judgment seems too learnable", "reduces rich judgment to mechanics"]

